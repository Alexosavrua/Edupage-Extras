<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">
    <script>
      document.documentElement.dataset.theme = "dark";
    </script>
    <style>
      html,
      body {
        background: #11111b;
        color: #cdd6f4;
      }
    </style>
    <link rel="stylesheet" href="menu.css">
    <title>Edupage Extras</title>
  </head>
  <body>
    <main class="menu">
      <header class="menu-header">
        <h1>Edupage Extras</h1>
        <span class="menu-version">0.2</span>
      </header>

      <label class="toggle-row" for="DarkModeCheckbox">
        <span>
          <strong>Themes</strong>
          <small>Use Edupage Extras colors</small>
        </span>
        <input type="checkbox" id="DarkModeCheckbox">
      </label>

      <div class="button-stack">
        <button class="menu-button" id="SettingsButton" type="button">
          <span>Settings</span>
          <span aria-hidden="true">></span>
        </button>
      </div>

      <footer class="made-by">
        Made by <a href="https://github.com/Alexosavrua" target="_blank" rel="noopener noreferrer">JustAlex</a>
      </footer>
    </main>
    <script src="menu.js"></script>
  </body>
</html>
